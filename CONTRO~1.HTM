<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinanceApp — Controle Financeiro Pessoal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg-primary: #0f172a;
  --bg-secondary: #1e293b;
  --bg-card: #1e293b;
  --bg-hover: #2d3f55;
  --border: #334155;
  --accent: #6366f1;
  --accent-light: #818cf8;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
  --info: #3b82f6;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --sidebar-width: 260px;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 14px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
}

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0;
  height: 100vh;
  z-index: 100;
  transition: transform 0.3s ease;
}
.sidebar-logo {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.sidebar-logo h1 { font-size: 15px; font-weight: 700; }
.sidebar-logo small { font-size: 11px; color: var(--text-muted); }
.sidebar-nav { flex: 1; padding: 16px 10px; overflow-y: auto; }
.nav-section { margin-bottom: 4px; }
.nav-section-title {
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--text-muted);
  padding: 10px 12px 4px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 13px; font-weight: 500;
  transition: all 0.15s;
  margin-bottom: 2px;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active { background: rgba(99,102,241,.15); color: var(--accent-light); }
.nav-item .ni { font-size: 16px; width: 22px; text-align: center; }
.sidebar-footer {
  padding: 14px 24px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
}

/* ── MAIN ── */
.main {
  flex: 1;
  margin-left: var(--sidebar-width);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.topbar {
  height: 62px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  position: sticky; top: 0; z-index: 50;
  gap: 12px;
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-title { font-size: 17px; font-weight: 600; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.content { flex: 1; padding: 24px; overflow-y: auto; }

/* ── MONTH NAV ── */
.month-nav {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
}
.month-nav .month-label { font-size: 12px; font-weight: 600; min-width: 130px; text-align: center; }
.btn-icon {
  padding: 5px 8px;
  border-radius: 6px;
  background: transparent; border: none;
  color: var(--text-secondary);
  cursor: pointer; transition: all 0.15s;
  font-size: 14px; line-height: 1;
}
.btn-icon:hover { background: var(--bg-hover); color: var(--text-primary); }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px;
  border-radius: 8px; font-size: 13px; font-weight: 500;
  cursor: pointer; border: none; transition: all 0.15s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-light); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { filter: brightness(1.1); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { filter: brightness(1.1); }
.btn-warning { background: var(--warning); color: #000; }
.btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }
.btn-sm { padding: 5px 11px; font-size: 12px; }
.hamburger { display: none; background: none; border: none; color: var(--text-primary); font-size: 22px; cursor: pointer; padding: 4px; }

/* ── STATS GRID ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 3px;
}
.stat-card.green::before { background: var(--success); }
.stat-card.red::before { background: var(--danger); }
.stat-card.blue::before { background: var(--info); }
.stat-card.purple::before { background: var(--accent); }
.stat-card.yellow::before { background: var(--warning); }
.stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--text-secondary); margin-bottom: 8px; }
.stat-value { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.stat-sub { font-size: 11px; color: var(--text-muted); }
.stat-icon { position: absolute; right: 16px; top: 14px; font-size: 26px; opacity: .18; }

/* ── PANEL ── */
.panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 20px;
}
.panel-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.panel-title { font-size: 13px; font-weight: 600; }
.panel-body { padding: 20px; }

/* ── CHARTS ── */
.chart-wrap { position: relative; height: 250px; }
.charts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 16px;
  margin-bottom: 20px;
}

/* ── TABLE ── */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  text-align: left; padding: 10px 16px;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .5px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
}
.data-table td { padding: 11px 16px; font-size: 13px; border-bottom: 1px solid rgba(51,65,85,.5); vertical-align: middle; }
.data-table tr:hover td { background: rgba(255,255,255,.02); }
.data-table tr:last-child td { border-bottom: none; }

/* ── BADGES ── */
.badge {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 6px;
  font-size: 10px; font-weight: 600;
}
.badge-success { background: rgba(16,185,129,.15); color: var(--success); }
.badge-danger  { background: rgba(239,68,68,.15);  color: var(--danger); }
.badge-warning { background: rgba(245,158,11,.15); color: var(--warning); }
.badge-info    { background: rgba(59,130,246,.15);  color: var(--info); }
.badge-purple  { background: rgba(99,102,241,.15);  color: var(--accent-light); }
.badge-default { background: rgba(148,163,184,.12); color: var(--text-secondary); }

/* ── FORM ── */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 9px 13px;
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: 7px; color: var(--text-primary);
  font-size: 14px; transition: border-color .15s; outline: none;
}
.form-input:focus, .form-select:focus { border-color: var(--accent); }
.form-select option { background: var(--bg-secondary); }
.form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
.form-hint { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.65); backdrop-filter: blur(4px);
  z-index: 1000; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 100%; max-width: 580px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow);
}
.modal-header {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-size: 15px; font-weight: 600; }
.modal-body { padding: 18px 22px; }
.modal-footer {
  padding: 14px 22px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 10px;
}

/* ── TOAST ── */
.toast-container { position: fixed; top: 18px; right: 18px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px;
  display: flex; align-items: center; gap: 10px;
  min-width: 240px; box-shadow: var(--shadow);
  animation: toastIn .3s ease; font-size: 13px;
}
.toast.success { border-left: 3px solid var(--success); }
.toast.error   { border-left: 3px solid var(--danger); }
.toast.info    { border-left: 3px solid var(--info); }
.toast.warning { border-left: 3px solid var(--warning); }
@keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ── PROGRESS ── */
.prog-bar { height: 7px; background: rgba(255,255,255,.08); border-radius: 4px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }

/* ── CREDIT CARD ── */
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 16px; }
.cc {
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  border: 1px solid var(--border);
  border-radius: 16px; padding: 22px;
  position: relative; overflow: hidden;
  cursor: pointer; transition: transform .2s, box-shadow .2s;
}
.cc:hover { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(0,0,0,.4); }
.cc::before {
  content: ''; position: absolute;
  top: -40px; right: -40px;
  width: 100px; height: 100px;
  background: rgba(99,102,241,.08);
  border-radius: 50%;
}
.cc-flag { position: absolute; top: 16px; right: 16px; font-size: 22px; }
.cc-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
.cc-bank { font-size: 11px; color: var(--text-secondary); margin-bottom: 18px; }
.cc-bar { height: 5px; background: rgba(255,255,255,.1); border-radius: 3px; margin-bottom: 7px; overflow: hidden; }
.cc-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .5s; }
.cc-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-secondary); }
.cc-actions { display: flex; gap: 6px; margin-top: 14px; }

/* ── INVESTMENT ── */
.inv-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
.inv-card { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
.inv-value { font-size: 19px; font-weight: 700; color: var(--success); }
.inv-label { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

/* ── GOAL CARD ── */
.goal-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 14px; }

/* ── CALC RESULT ── */
.calc-result { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-top: 10px; }
.calc-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: 13px; border-bottom: 1px solid rgba(51,65,85,.4); }
.calc-row:last-child { border-bottom: none; font-weight: 600; }
.calc-row .cl { color: var(--text-secondary); }

/* ── ALERT ── */
.alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 8px; }
.alert-warning { background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.3); color: #fbbf24; }
.alert-info    { background: rgba(99,102,241,.1);  border: 1px solid rgba(99,102,241,.3); color: var(--accent-light); }
.alert-success { background: rgba(16,185,129,.1);  border: 1px solid rgba(16,185,129,.3); color: var(--success); }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 50px 24px; color: var(--text-muted); }
.empty .ei { font-size: 44px; margin-bottom: 14px; opacity: .5; }
.empty p { font-size: 14px; margin-bottom: 16px; }

/* ── TABS ── */
.tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; gap: 2px; }
.tab { padding: 10px 16px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-secondary); border-bottom: 2px solid transparent; transition: all .15s; margin-bottom: -1px; }
.tab:hover { color: var(--text-primary); }
.tab.active { color: var(--accent-light); border-bottom-color: var(--accent); }

/* ── MOBILE ── */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .hamburger { display: block; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .charts-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .content { padding: 16px; }
  .month-label { min-width: 90px !important; font-size: 11px !important; }
}
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 99; }
.sidebar-overlay.active { display: block; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- ── SIDEBAR ── -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">💰</div>
    <div>
      <h1>FinanceApp</h1>
      <small>Controle Financeiro</small>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-title">Principal</div>
      <div class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard">
        <span class="ni">📊</span> Dashboard
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">Gestão</div>
      <div class="nav-item" onclick="navigate('receitas')" id="nav-receitas">
        <span class="ni">💵</span> Receitas
      </div>
      <div class="nav-item" onclick="navigate('compras')" id="nav-compras">
        <span class="ni">🛒</span> Compras / Despesas
      </div>
      <div class="nav-item" onclick="navigate('cartoes')" id="nav-cartoes">
        <span class="ni">💳</span> Cartões de Crédito
      </div>
      <div class="nav-item" onclick="navigate('reserva')" id="nav-reserva">
        <span class="ni">🏦</span> Reserva Financeira
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">Análise</div>
      <div class="nav-item" onclick="navigate('relatorios')" id="nav-relatorios">
        <span class="ni">📈</span> Relatórios
      </div>
      <div class="nav-item" onclick="navigate('metas')" id="nav-metas">
        <span class="ni">🎯</span> Metas Financeiras
      </div>
    </div>
  </nav>
  <div class="sidebar-footer">Dados salvos localmente no navegador</div>
</aside>

<!-- ── MAIN ── -->
<main class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <span class="topbar-title" id="page-title">Dashboard</span>
    </div>
    <div class="topbar-right">
      <div class="month-nav">
        <button class="btn-icon" onclick="changeMonth(-1)">‹</button>
        <span class="month-label" id="month-label">—</span>
        <button class="btn-icon" onclick="changeMonth(1)">›</button>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="exportCSV()" title="Exportar CSV">⬇ CSV</button>
    </div>
  </header>
  <div class="content" id="app-content"></div>
</main>

<!-- ── MODAL ── -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title"></h2>
      <button class="btn-icon" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- ── TOASTS ── -->
<div class="toast-container" id="toasts"></div>

<script>
'use strict';

// ════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════
const CAT_EXP  = ['Alimentação','Transporte','Saúde','Educação','Lazer','Vestuário','Moradia','Tecnologia','Serviços','Assinatura','Outros'];
const CAT_INC  = ['Salário','Comissão','Freelance','Rendimentos','Aluguel','Presente','Bônus','Outros'];
const FLAGS    = ['Visa','Mastercard','Elo','American Express','Hipercard','Outros'];
const BANKS    = ['Nubank','Itaú','Bradesco','Santander','Caixa','Banco do Brasil','Inter','C6 Bank','BTG Pactual','Mercado Pago','XP','Outros'];
const COLORS   = ['#6366f1','#10b981','#ef4444','#f59e0b','#3b82f6','#ec4899','#8b5cf6','#14b8a6','#f97316','#06b6d4','#84cc16','#64748b'];
const FLAG_EMOJI = { Visa:'💳', Mastercard:'🔴', Elo:'🟡', 'American Express':'💚', Hipercard:'🔵', Outros:'💳' };

// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
let S = {
  cards: [], purchases: [], incomes: [], savings: [], goals: [],
  cm: new Date().getMonth(), cy: new Date().getFullYear()
};
let charts = {};

// ════════════════════════════════════════════════
// PERSISTENCE
// ════════════════════════════════════════════════
function loadData() {
  try {
    const raw = localStorage.getItem('fa_v3');
    if (raw) {
      const d = JSON.parse(raw);
      S.cards     = d.cards     || [];
      S.purchases = d.purchases || [];
      S.incomes   = d.incomes   || [];
      S.savings   = d.savings   || [];
      S.goals     = d.goals     || [];
    }
  } catch(e) { console.warn('Load error', e); }
}
function saveData() {
  try { localStorage.setItem('fa_v3', JSON.stringify({ cards:S.cards, purchases:S.purchases, incomes:S.incomes, savings:S.savings, goals:S.goals })); }
  catch(e) { toast('Erro ao salvar dados', 'error'); }
}

// ════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════
const R = (n) => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(n||0);
const fDate = (d) => { if(!d) return ''; return new Date(d+'T12:00:00').toLocaleDateString('pt-BR'); };
const mName  = (m,y) => new Date(y,m,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
const mKey   = (m,y) => `${y}-${String(m+1).padStart(2,'0')}`;
const genId  = () => Date.now().toString(36)+Math.random().toString(36).slice(2);

function dMonth(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr+'T12:00:00');
  return { m: d.getMonth(), y: d.getFullYear() };
}
function isCurMonth(dateStr) {
  const dm = dMonth(dateStr);
  return dm && dm.m === S.cm && dm.y === S.cy;
}
function monthSum(arr, key, m, y) {
  return arr.filter(i => { const dm=dMonth(i.date); return dm && dm.m===m && dm.y===y; })
            .reduce((s,i) => s + (parseFloat(i[key])||0), 0);
}
function last12() {
  const res = [];
  for (let i=11; i>=0; i--) {
    let m = S.cm - i, y = S.cy;
    while (m < 0) { m += 12; y--; }
    res.push({ m, y, label: new Date(y,m,1).toLocaleDateString('pt-BR',{month:'short',year:'2-digit'}) });
  }
  return res;
}
function calcInstallment(total, n, rate) {
  if (!rate || rate <= 0) return total / n;
  const r = rate / 100;
  return total * (r * Math.pow(1+r,n)) / (Math.pow(1+r,n) - 1);
}
function calcTotal(total, n, rate) {
  return (!rate || rate <= 0) ? total : calcInstallment(total, n, rate) * n;
}

let curPage = 'dashboard';
const PAGE_TITLES = { dashboard:'Dashboard', receitas:'Receitas', compras:'Compras / Despesas', cartoes:'Cartões de Crédito', reserva:'Reserva Financeira', relatorios:'Relatórios', metas:'Metas Financeiras' };

function navigate(page) {
  curPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-'+page)?.classList.add('active');
  document.getElementById('page-title').textContent = PAGE_TITLES[page] || page;
  destroyCharts();
  const pages = { dashboard:pgDashboard, receitas:pgReceitas, compras:pgCompras, cartoes:pgCartoes, reserva:pgReserva, relatorios:pgRelatorios, metas:pgMetas };
  pages[page]?.();
  if (window.innerWidth <= 768) closeSidebar();
}
function changeMonth(d) {
  S.cm += d;
  if (S.cm > 11) { S.cm = 0; S.cy++; }
  if (S.cm < 0)  { S.cm = 11; S.cy--; }
  document.getElementById('month-label').textContent = mName(S.cm, S.cy);
  navigate(curPage);
}
function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e){} });
  charts = {};
}
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('active');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('active');
}

function openModal(title, body, footer) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer || '<button class="btn btn-ghost" onclick="closeModal()">Fechar</button>';
  document.getElementById('modal-overlay').classList.add('active');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); }
function handleOverlayClick(e) { if (e.target === e.currentTarget) closeModal(); }

// TOAST
// ════════════════════════════════════════════════
function toast(msg, type='info') {
  const icons = { success:'✅', error:'❌', info:'ℹ️', warning:'⚠️' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]||'📢'}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => { el.style.animation='toastIn .3s ease reverse'; setTimeout(()=>el.remove(), 280); }, 3200);
}

// CHART HELPERS

const chartDefaults = {
  responsive: true, maintainAspectRatio: false,
  plugins: {
    legend: { labels: { color:'#94a3b8', font:{size:11}, boxWidth:12 } },
    tooltip: { callbacks: { label: ctx => ' '+R(ctx.raw) } }
  },
  scales: {
    x: { grid:{color:'rgba(51,65,85,.5)'}, ticks:{color:'#64748b',font:{size:10}} },
    y: { grid:{color:'rgba(51,65,85,.5)'}, ticks:{color:'#64748b', callback: v => 'R$'+(v>=1000?((v/1000).toFixed(0)+'k'):v)} }
  }
};

function mkBar(id, labels, datasets) {
  const c = document.getElementById(id);
  if (!c) return;
  charts[id] = new Chart(c, { type:'bar', data:{ labels, datasets }, options: JSON.parse(JSON.stringify(chartDefaults)) });
}
function mkLine(id, labels, datasets) {
  const c = document.getElementById(id);
  if (!c) return;
  charts[id] = new Chart(c, { type:'line', data:{ labels, datasets }, options: JSON.parse(JSON.stringify(chartDefaults)) });
}
function mkDoughnut(id, labels, data) {
  const c = document.getElementById(id);
  if (!c) return;
  if (!data.some(v=>v>0)) { renderNoData(c); return; }
  charts[id] = new Chart(c, {
    type: 'doughnut',
    data: { labels, datasets:[{ data, backgroundColor: labels.map((_,i)=>COLORS[i%COLORS.length]), borderWidth:0, hoverOffset:8 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'right', labels:{color:'#94a3b8',font:{size:10},padding:10,boxWidth:10} }, tooltip:{ callbacks:{ label: ctx => ' '+R(ctx.raw) } } } }
  });
}
function renderNoData(canvas) {
  try {
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#475569'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Sem dados para exibir', canvas.width/2, canvas.height/2);
  } catch(e){}
}

function pgDashboard() {
  const m=S.cm, y=S.cy;
  const totalR = monthSum(S.incomes, 'value', m, y);
  const totalD = S.purchases.filter(p=>{ const dm=dMonth(p.date); return dm&&dm.m===m&&dm.y===y; })
                             .reduce((s,p) => s+(parseFloat(p.totalValue)||0), 0);
  const totalS = monthSum(S.savings, 'value', m, y);
  const saldo  = totalR - totalD - totalS;
  const totalAcum = S.savings.reduce((s,v) => s+(parseFloat(v.value)||0), 0);

  // Faturas próximas
  const today = new Date();
  const alertas = S.cards.map(card => {
    const fatura = S.purchases.filter(p => p.cardId===card.id && isCurMonth(p.date))
                               .reduce((s,p) => s+(parseFloat(p.totalValue)||0), 0);
    if (!fatura) return null;
    let due = new Date(y, m, card.dueDay);
    if (due < today) due.setMonth(due.getMonth()+1);
    const diff = Math.ceil((due-today)/(1000*60*60*24));
    return diff <= 7 && diff >= 0 ? { name:card.name, fatura, diff } : null;
  }).filter(Boolean);

  const recentTx = [
    ...S.incomes.filter(i=>isCurMonth(i.date)).map(i=>({...i,type:'income'})),
    ...S.purchases.filter(p=>isCurMonth(p.date)).map(p=>({...p,type:'expense'})),
    ...S.savings.filter(s=>isCurMonth(s.date)).map(s=>({...s,type:'saving',description:s.observation||'Aporte MP'})),
  ].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,10);

  document.getElementById('app-content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card green">
        <div class="stat-icon">💵</div>
        <div class="stat-label">Receitas do Mês</div>
        <div class="stat-value">${R(totalR)}</div>
        <div class="stat-sub">${S.incomes.filter(i=>isCurMonth(i.date)).length} lançamentos</div>
      </div>
      <div class="stat-card red">
        <div class="stat-icon">🛒</div>
        <div class="stat-label">Despesas do Mês</div>
        <div class="stat-value">${R(totalD)}</div>
        <div class="stat-sub">${S.purchases.filter(p=>isCurMonth(p.date)).length} compras</div>
      </div>
      <div class="stat-card ${saldo>=0?'blue':'red'}">
        <div class="stat-icon">${saldo>=0?'✅':'⚠️'}</div>
        <div class="stat-label">Saldo do Mês</div>
        <div class="stat-value" style="color:${saldo>=0?'var(--success)':'var(--danger)'}">${R(saldo)}</div>
        <div class="stat-sub">Receitas − Despesas − Aportes</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-icon">🏦</div>
        <div class="stat-label">Aporte no Mês</div>
        <div class="stat-value">${R(totalS)}</div>
        <div class="stat-sub">Acumulado: ${R(totalAcum)}</div>
      </div>
    </div>

    ${alertas.length ? `<div class="alert alert-warning">⚠️ <div><strong>Faturas próximas:</strong> ${alertas.map(a=>`<strong>${a.name}</strong> (${R(a.fatura)}) vence em ${a.diff===0?'hoje':a.diff+'d'}`).join(' · ')}</div></div>` : ''}

    <div class="charts-grid">
      <div class="panel">
        <div class="panel-header"><span class="panel-title">📊 Receitas x Despesas — 12 meses</span></div>
        <div class="panel-body"><div class="chart-wrap"><canvas id="ch-rd"></canvas></div></div>
      </div>
      <div class="panel">
        <div class="panel-header"><span class="panel-title">🥧 Gastos por Categoria — Mês</span></div>
        <div class="panel-body"><div class="chart-wrap"><canvas id="ch-cat"></canvas></div></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">📋 Últimas Transações</span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary btn-sm" onclick="navigate('receitas')">+ Receita</button>
          <button class="btn btn-ghost btn-sm" onclick="navigate('compras')">+ Despesa</button>
        </div>
      </div>
      <div style="overflow-x:auto">
        ${recentTx.length ? `
        <table class="data-table">
          <thead><tr><th>Descrição</th><th>Categoria</th><th>Data</th><th>Valor</th></tr></thead>
          <tbody>
            ${recentTx.map(t => `<tr>
              <td>${t.type==='income'?'🟢':t.type==='saving'?'🔵':'🔴'} ${t.description||'—'}</td>
              <td><span class="badge badge-default">${t.category||'—'}</span></td>
              <td>${fDate(t.date)}</td>
              <td style="font-weight:600;color:${t.type==='income'?'var(--success)':t.type==='saving'?'var(--info)':'var(--danger)'}">
                ${t.type==='income'?'+':'−'}${R(parseFloat(t.value||t.totalValue||0))}
              </td>
            </tr>`).join('')}
          </tbody>
        </table>` : '<div class="empty"><p>Nenhuma transação neste mês</p></div>'}
      </div>
    </div>
  `;

  setTimeout(() => {
    const months = last12();
    const labels = months.map(x=>x.label);
    mkBar('ch-rd', labels, [
      { label:'Receitas', data: months.map(({m,y})=>monthSum(S.incomes,'value',m,y)), backgroundColor:'rgba(16,185,129,.7)', borderRadius:4 },

    mkDoughnut('ch-cat', cats.map(c=>c[0]), cats.map(c=>c[1]));
  }, 50);
}

    </div>

function svReceita(id) {
  const d=document.getElementById('fd').value.trim(), v=parseFloat(document.getElementById('fv').value), dt=document.getElementById('fdt').value, c=document.getElementById('fc').value;

  else { S.incomes.push({id:genId(),description:d,value:v,date:dt,category:c}); toast('Receita adicionada!','success'); }
  saveData(); closeModal(); pgReceitas();
}
function delReceita(id) {
  if (!confirm('Excluir esta receita?')) return;
  S.incomes = S.incomes.filter(i=>i.id!==id); saveData(); toast('Removida','info'); pgReceitas();
}

function mCompra(id='') {
  const it = id ? S.purchases.find(p=>p.id===id) : null;
  const today = new Date().toISOString().split('T')[0];
  openModal(it?'Editar Compra':'Nova Compra / Despesa', `
    <div class="form-group"><label class="form-label">Descrição *</label><input class="form-input" id="fd" placeholder="Ex: Supermercado, Combustível..." value="${it?.description||''}"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Categoria</label><select class="form-select" id="fc">${CAT_EXP.map(c=>`<option ${it?.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Data *</label><input class="form-input" id="fdt" type="date" value="${it?.date||today}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Valor Total (R$) *</label><input class="form-input" id="fv" type="number" step="0.01" min="0" placeholder="0,00" value="${it?.totalValue||''}" oninput="calcP()"></div>
      <div class="form-group"><label class="form-label">Parcelas</label><input class="form-input" id="fn" type="number" min="1" max="72" value="${it?.installments||1}" oninput="calcP()"><div class="form-hint">1 = à vista</div></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Juros (% ao mês)</label><input class="form-input" id="fi" type="number" step="0.01" min="0" placeholder="0,00" value="${it?.interestRate||''}" oninput="calcP()"><div class="form-hint">Deixe vazio para sem juros</div></div>
      <div class="form-group"><label class="form-label">Cartão</label><select class="form-select" id="fcard"><option value="">💵 Débito / Dinheiro</option>${S.cards.map(c=>`<option value="${c.id}" ${it?.cardId===c.id?'selected':''}>${c.name}</option>`).join('')}</select></div>
    </div>
    <div id="calc-panel"></div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-danger" onclick="svCompra('${id}')">💾 Salvar</button>`);
  setTimeout(calcP, 60);
}
function calcP() {
  const total=parseFloat(document.getElementById('fv')?.value)||0;
  const n=parseInt(document.getElementById('fn')?.value)||1;
  const rate=parseFloat(document.getElementById('fi')?.value)||0;
  const panel=document.getElementById('calc-panel');
  if (!panel||!total) { if(panel) panel.innerHTML=''; return; }
  const pmt = calcInstallment(total,n,rate);
  const tw  = calcTotal(total,n,rate);
  const int = tw-total;
  panel.innerHTML=`<div class="calc-result">
    <div style="font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">📊 Simulação</div>
    <div class="calc-row"><span class="cl">Valor original</span><span>${R(total)}</span></div>
    <div class="calc-row"><span class="cl">Parcelas</span><span>${n}x de ${R(pmt)}</span></div>
    ${rate>0?`
    <div class="calc-row"><span class="cl">Juros totais</span><span style="color:var(--danger)">+${R(int)}</span></div>
    <div class="calc-row"><span class="cl">Total final</span><span style="color:var(--warning)">${R(tw)}</span></div>
    <div class="calc-row"><span class="cl" style="font-size:11px">Sem juros seria</span><span style="font-size:11px;color:var(--text-muted)">${n}x de ${R(total/n)}</span></div>
    `:`<div class="calc-row"><span style="color:var(--success)">✅ Sem juros</span><span style="color:var(--success)">${R(total)}</span></div>`}
  </div>`;
}
function svCompra(id) {
  const d=document.getElementById('fd').value.trim();
  const v=parseFloat(document.getElementById('fv').value);
  const dt=document.getElementById('fdt').value;
  const n=parseInt(document.getElementById('fn').value)||1;
  const rate=parseFloat(document.getElementById('fi').value)||0;
  const cardId=document.getElementById('fcard').value;
  const cat=document.getElementById('fc').value;
  if (!d||!v||!dt) return toast('Preencha os campos obrigatórios','error');
  const pmt=calcInstallment(v,n,rate), tw=calcTotal(v,n,rate);
  const obj={description:d,category:cat,date:dt,totalValue:v,installments:n,interestRate:rate,cardId,installmentValue:pmt,totalWithInterest:tw};
  if (id) { const i=S.purchases.findIndex(p=>p.id===id); S.purchases[i]={...S.purchases[i],...obj}; toast('Compra atualizada!','success'); }
  else { S.purchases.push({id:genId(),...obj}); toast('Compra registrada!','success'); }
  saveData(); closeModal(); pgCompras();
}
function delCompra(id) {
  if (!confirm('Excluir esta compra?')) return;
  S.purchases=S.purchases.filter(p=>p.id!==id); saveData(); toast('Removida','info'); pgCompras();
}

function pgCartoes() {
  document.getElementById('app-content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <span style="font-size:13px;color:var(--text-secondary)">${S.cards.length} cartão(ões)</span>
      <button class="btn btn-primary" onclick="mCartao()">+ Novo Cartão</button>
    </div>
    ${S.cards.length ? `<div class="card-grid">${S.cards.map(c=>mkCC(c)).join('')}</div>` : `<div class="empty"><div class="ei">💳</div><p>Nenhum cartão cadastrado</p><button class="btn btn-primary" onclick="mCartao()">+ Adicionar Cartão</button></div>`}
    ${S.cards.length ? `
    <div class="panel" style="margin-top:24px">
      <div class="panel-header"><span class="panel-title">📋 Uso por Cartão — Mês Atual</span></div>
      <div style="overflow-x:auto">
        <table class="data-table">
          <thead><tr><th>Cartão</th><th>Qtd.</th><th>Total Mês</th><th>Uso do Limite</th></tr></thead>
          <tbody>
            ${S.cards.map(card=>{
              const ps=S.purchases.filter(p=>p.cardId===card.id&&isCurMonth(p.date));
              const tot=ps.reduce((s,p)=>s+(parseFloat(p.totalValue)||0),0);
              const pct=card.limit?((tot/card.limit)*100).toFixed(1):0;
              return `<tr>
                <td><strong>${card.name}</strong> <span style="color:var(--text-muted);font-size:11px">${card.bank}</span></td>
                <td>${ps.length}</td>

                <td><div style="display:flex;align-items:center;gap:8px">
                  <div class="prog-bar" style="width:90px"><div class="prog-fill" style="width:${Math.min(pct,100)}%;background:${pct>80?'var(--danger)':pct>50?'var(--warning)':'var(--success)'}"></div></div>
                  <span style="font-size:12px">${pct}%</span>
                </div></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>` : ''}`;
}
function mkCC(c) {
  const used = (c.limit||0)-(c.availableLimit||c.limit||0);
  const pct  = c.limit ? ((used/c.limit)*100) : 0;
  return `<div class="cc">
    <div class="cc-flag">${FLAG_EMOJI[c.flag]||'💳'}</div>
    <div class="cc-name">${c.name}</div>
    <div class="cc-bank">${c.bank} · ${c.flag}</div>
    <div class="cc-bar"><div class="cc-bar-fill" style="width:${Math.min(pct,100)}%"></div></div>
    <div class="cc-info"><span>Limite: ${R(c.limit)}</span><span>Disponível: ${R(c.availableLimit||c.limit)}</span></div>
    <div class="cc-info" style="margin-top:6px"><span>Fecha dia ${c.closingDay}</span><span>Vence dia ${c.dueDay}</span></div>
    <div class="cc-actions">
      <button class="btn btn-ghost btn-sm" onclick="mCartao('${c.id}')">✏️ Editar</button>
      <button class="btn btn-ghost btn-sm" onclick="delCartao('${c.id}')">🗑️</button>
    </div>
  </div>`;
}
function mCartao(id='') {
  const it=id?S.cards.find(c=>c.id===id):null;
  openModal(it?'Editar Cartão':'Novo Cartão de Crédito', `
    <div class="form-row">
      <div class="form-group"><label class="form-label">Nome *</label><input class="form-input" id="fn" placeholder="Ex: Nubank Roxinho" value="${it?.name||''}"></div>
      <div class="form-group"><label class="form-label">Banco</label><select class="form-select" id="fb">${BANKS.map(b=>`<option ${it?.bank===b?'selected':''}>${b}</option>`).join('')}</select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Bandeira</label><select class="form-select" id="ff">${FLAGS.map(f=>`<option ${it?.flag===f?'selected':''}>${f}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Limite Total (R$) *</label><input class="form-input" id="fl" type="number" step="0.01" min="0" placeholder="0,00" value="${it?.limit||''}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Limite Disponível (R$)</label><input class="form-input" id="fal" type="number" step="0.01" min="0" placeholder="0,00" value="${it?.availableLimit||''}"><div class="form-hint">Deixe vazio = limite total</div></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Dia Fechamento *</label><input class="form-input" id="fcl" type="number" min="1" max="31" placeholder="Ex: 25" value="${it?.closingDay||''}"></div>
      <div class="form-group"><label class="form-label">Dia Vencimento *</label><input class="form-input" id="fdl" type="number" min="1" max="31" placeholder="Ex: 5" value="${it?.dueDay||''}"></div>
    </div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="svCartao('${id}')">💾 Salvar</button>`);
}
function svCartao(id) {
  const name=document.getElementById('fn').value.trim(), bank=document.getElementById('fb').value, flag=document.getElementById('ff').value;
  const limit=parseFloat(document.getElementById('fl').value), avail=parseFloat(document.getElementById('fal').value)||limit;
  const closing=parseInt(document.getElementById('fcl').value), due=parseInt(document.getElementById('fdl').value);
  if (!name||!limit||!closing||!due) return toast('Preencha todos os campos obrigatórios','error');
  const obj={name,bank,flag,limit,availableLimit:avail,closingDay:closing,dueDay:due};
  if (id) { const i=S.cards.findIndex(c=>c.id===id); S.cards[i]={...S.cards[i],...obj}; toast('Cartão atualizado!','success'); }
  else { S.cards.push({id:genId(),...obj}); toast('Cartão adicionado!','success'); }
  saveData(); closeModal(); pgCartoes();
}
function delCartao(id) {
  if (!confirm('Excluir este cartão?')) return;
  S.cards=S.cards.filter(c=>c.id!==id); saveData(); toast('Removido','info'); pgCartoes();
}

  document.getElementById('app-content').innerHTML = `
    <div class="inv-grid">
      <div class="inv-card"><div class="inv-value">${R(total)}</div><div class="inv-label">💰 Total Acumulado</div></div>
      <div class="inv-card"><div class="inv-value">${R(mTot)}</div><div class="inv-label">📅 Aporte do Mês</div></div>

      <div class="panel">
        <div class="panel-header"><span class="panel-title">📊 Aportes por Mês (12 meses)</span></div>

      </div>
      <div class="panel">
        <div class="panel-header"><span class="panel-title">📈 Crescimento Acumulado</span></div>
        <div class="panel-body"><div class="chart-wrap"><canvas id="ch-sc"></canvas></div></div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">🏦 Aportes — ${mName(S.cm,S.cy)}</span>

      <div style="overflow-x:auto">
        ${list.length ? `
        <table class="data-table">
          <thead><tr><th>Data</th><th>Observação</th><th>Valor</th><th></th></tr></thead>

    let acc=0; const cumData=mData.map(v=>{acc+=v;return acc;});
    mkLine('ch-sc', labels, [{ label:'Patrimônio Acumulado', data:cumData, borderColor:'#10b981', backgroundColor:'rgba(16,185,129,.1)', fill:true, tension:.4, pointRadius:4, pointBackgroundColor:'#10b981' }]);

}
function mReserva() {
  const today=new Date().toISOString().split('T')[0];
  openModal('Novo Aporte — Mercado Pago', `
    <div class="form-row">
      <div class="form-group"><label class="form-label">Valor (R$) *</label><input class="form-input" id="fv" type="number" step="0.01" min="0" placeholder="0,00"></div>
      <div class="form-group"><label class="form-label">Data *</label><input class="form-input" id="fdt" type="date" value="${today}"></div>
    </div>
    <div class="form-group"><label class="form-label">Observação</label><input class="form-input" id="fob" placeholder="Ex: Aporte mensal de junho..."></div>

}
function svReserva() {
  const v=parseFloat(document.getElementById('fv').value), dt=document.getElementById('fdt').value, ob=document.getElementById('fob').value.trim();
  if (!v||!dt) return toast('Preencha os campos obrigatórios','error');
  S.savings.push({id:genId(),value:v,date:dt,observation:ob}); saveData(); toast('Aporte registrado!','success'); closeModal(); pgReserva();
}
function delReserva(id) {
  if (!confirm('Excluir este aporte?')) return;

}

// PAGE: RELATÓRIOS
// ════════════════════════════════════════════════
function pgRelatorios() {
  const months=last12();
  const rData=months.map(({m,y})=>monthSum(S.incomes,'value',m,y));
  const dData=months.map(({m,y})=>S.purchases.filter(p=>{const dm=dMonth(p.date);return dm&&dm.m===m&&dm.y===y}).reduce((s,p)=>s+(parseFloat(p.totalValue)||0),0));
  const sData=months.map(({m,y})=>monthSum(S.savings,'value',m,y));
  const balData=months.map((_,i)=>rData[i]-dData[i]-sData[i]);
  const catAll={}, cardAll={};
  S.purchases.forEach(p=>{
    catAll[p.category||'Outros']=(catAll[p.category||'Outros']||0)+parseFloat(p.totalValue||0);
    const c=S.cards.find(x=>x.id===p.cardId);
    const k=c?c.name:'Débito/Dinheiro';
    cardAll[k]=(cardAll[k]||0)+parseFloat(p.totalValue||0);
  });

  // Future installments
  const futMap={};
  S.purchases.filter(p=>p.installments>1).forEach(p=>{
    const sd=new Date(p.date+'T12:00:00');
    for(let i=0;i<p.installments;i++){
      const dd=new Date(sd); dd.setMonth(dd.getMonth()+i);
      if (dd>=new Date()) {
        const k=mKey(dd.getMonth(),dd.getFullYear());
        futMap[k]=(futMap[k]||0)+(p.installmentValue||p.totalValue/p.installments);
      }
    }
  });
  const futEntries=Object.entries(futMap).sort().slice(0,12);

  const avgR=rData.filter(v=>v>0); const avgD=dData.filter(v=>v>0);
  const mAvgR=avgR.length?avgR.reduce((a,b)=>a+b,0)/avgR.length:0;
  const mAvgD=avgD.length?avgD.reduce((a,b)=>a+b,0)/avgD.length:0;
  const taxa=mAvgR>0?((1-mAvgD/mAvgR)*100).toFixed(0):0;

  document.getElementById('app-content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card green"><div class="stat-label">Média Receitas/mês</div><div class="stat-value" style="font-size:18px">${R(mAvgR)}</div></div>
      <div class="stat-card red"><div class="stat-label">Média Despesas/mês</div><div class="stat-value" style="font-size:18px">${R(mAvgD)}</div></div>
      <div class="stat-card blue"><div class="stat-label">Taxa de Poupança</div><div class="stat-value" style="font-size:18px">${taxa}%</div><div class="stat-sub">média salva das receitas</div></div>
      <div class="stat-card purple"><div class="stat-label">Total Reservado</div><div class="stat-value" style="font-size:18px">${R(S.savings.reduce((s,v)=>s+(parseFloat(v.value)||0),0))}</div></div>
    </div>
    <div class="charts-grid">
      <div class="panel"><div class="panel-header"><span class="panel-title">📊 Receitas x Despesas</span></div><div class="panel-body"><div class="chart-wrap"><canvas id="cr-rd"></canvas></div></div></div>
      <div class="panel"><div class="panel-header"><span class="panel-title">💰 Evolução do Saldo</span></div><div class="panel-body"><div class="chart-wrap"><canvas id="cr-bal"></canvas></div></div></div>
      <div class="panel"><div class="panel-header"><span class="panel-title">🥧 Gastos por Categoria</span></div><div class="panel-body"><div class="chart-wrap"><canvas id="cr-cat"></canvas></div></div></div>
      <div class="panel"><div class="panel-header"><span class="panel-title">💳 Gastos por Cartão</span></div><div class="panel-body"><div class="chart-wrap"><canvas id="cr-card"></canvas></div></div></div>
    </div>
    <div class="panel" style="margin-bottom:20px">
      <div class="panel-header"><span class="panel-title">📋 Comparativo Mensal (12 meses)</span></div>
      <div style="overflow-x:auto">
        <table class="data-table">
          <thead><tr><th>Mês</th><th>Receitas</th><th>Despesas</th><th>Aportes</th><th>Saldo</th></tr></thead>
          <tbody>
            ${months.map(({label},i)=>{
              const r=rData[i],d=dData[i],sv=sData[i],bal=balData[i];
              return `<tr>
                <td><strong>${label}</strong></td>
                <td style="color:var(--success)">${R(r)}</td>
                <td style="color:var(--danger)">${R(d)}</td>
                <td style="color:var(--info)">${R(sv)}</td>
                <td style="font-weight:700;color:${bal>=0?'var(--success)':'var(--danger)'}">${R(bal)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
    ${futEntries.length ? `
    <div class="panel">
      <div class="panel-header"><span class="panel-title">🔮 Projeção de Parcelas Futuras</span></div>
      <div style="overflow-x:auto">
        <table class="data-table">
          <thead><tr><th>Mês</th><th>Comprometido em Parcelas</th></tr></thead>
          <tbody>
            ${futEntries.map(([k,v])=>`<tr><td>${k}</td><td style="color:var(--warning);font-weight:600">${R(v)}</td></tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>` : ''}`;

  setTimeout(() => {
    const labels=months.map(x=>x.label);
    mkBar('cr-rd', labels, [
      {label:'Receitas',data:rData,backgroundColor:'rgba(16,185,129,.7)',borderRadius:4},
      {label:'Despesas',data:dData,backgroundColor:'rgba(239,68,68,.7)',borderRadius:4}
    ]);
    mkLine('cr-bal', labels, [{
      label:'Saldo',data:balData,borderColor:'#6366f1',backgroundColor:'rgba(99,102,241,.1)',fill:true,tension:.4,
      pointRadius:4, pointBackgroundColor:balData.map(v=>v>=0?'#10b981':'#ef4444')
    }]);
    const cats=Object.entries(catAll).sort((a,b)=>b[1]-a[1]);
    mkDoughnut('cr-cat', cats.map(c=>c[0]), cats.map(c=>c[1]));
    const cards=Object.entries(cardAll).sort((a,b)=>b[1]-a[1]);
    mkDoughnut('cr-card', cards.map(c=>c[0]), cards.map(c=>c[1]));
  }, 50);
}

// ════════════════════════════════════════════════
// PAGE: METAS
// ════════════════════════════════════════════════
const GOAL_ICONS = ['🎯','🏠','🚗','✈️','📱','💻','🎓','💍','👶','🏋️','🏖️','💊','📈','🎸'];
function pgMetas() {
  document.getElementById('app-content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <span style="font-size:13px;color:var(--text-secondary)">${S.goals.length} meta(s)</span>
      <button class="btn btn-primary" onclick="mMeta()">+ Nova Meta</button>
    </div>
    ${S.goals.length ? S.goals.map(g=>mkGoal(g)).join('') : `<div class="empty"><div class="ei">🎯</div><p>Nenhuma meta criada ainda</p><p style="font-size:12px;color:var(--text-muted)">Defina objetivos e acompanhe seu progresso</p><button class="btn btn-primary" onclick="mMeta()">+ Criar Primeira Meta</button></div>`}`;
}
function mkGoal(g) {
  const pct = Math.min((g.currentValue/g.targetValue)*100,100);
  const rem = Math.max(0, g.targetValue-g.currentValue);
  const days = g.deadline ? Math.ceil((new Date(g.deadline)-new Date())/(1000*60*60*24)) : null;
  const col  = pct>=100?'var(--success)':pct>=50?'var(--info)':'var(--warning)';
  return `<div class="goal-card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
      <div>
        <div style="font-size:15px;font-weight:600;margin-bottom:3px">${g.icon||'🎯'} ${g.name}</div>
        <div style="font-size:12px;color:var(--text-secondary)">${g.category||'Geral'}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        ${pct>=100?'<span class="badge badge-success">✅ Atingida</span>':days!==null&&days<=30?`<span class="badge badge-warning">⏰ ${days}d</span>`:`<span class="badge badge-info">${pct.toFixed(0)}%</span>`}
        <button class="btn-icon" onclick="mMeta('${g.id}')">✏️</button>
        <button class="btn-icon" onclick="delMeta('${g.id}')">🗑️</button>
      </div>
    </div>
    <div class="prog-bar" style="margin-bottom:10px">
      <div class="prog-fill" style="width:${pct}%;background:${col}"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary)">
      <span>Alcançado: <strong style="color:var(--text-primary)">${R(g.currentValue)}</strong></span>
      <span>Meta: <strong style="color:var(--text-primary)">${R(g.targetValue)}</strong></span>
      <span>Falta: <strong style="color:var(--warning)">${R(rem)}</strong></span>
    </div>
    ${g.deadline?`<div style="font-size:11px;color:var(--text-muted);margin-top:8px">📅 Prazo: ${fDate(g.deadline)}</div>`:''}
    ${g.description?`<div style="font-size:12px;color:var(--text-secondary);margin-top:6px">${g.description}</div>`:''}
    <div style="margin-top:12px"><button class="btn btn-ghost btn-sm" onclick="mMetaProgress('${g.id}')">💰 Atualizar Progresso</button></div>
  </div>`;
}
function mMeta(id='') {
  const it=id?S.goals.find(g=>g.id===id):null;
  openModal(it?'Editar Meta':'Nova Meta Financeira', `
    <div class="form-row">
      <div class="form-group"><label class="form-label">Nome da Meta *</label><input class="form-input" id="fn" placeholder="Ex: Viagem para Europa" value="${it?.name||''}"></div>
      <div class="form-group"><label class="form-label">Ícone</label><select class="form-select" id="fi">${GOAL_ICONS.map(i=>`<option ${it?.icon===i?'selected':''}>${i}</option>`).join('')}</select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Valor Alvo (R$) *</label><input class="form-input" id="ft" type="number" step="0.01" min="0" placeholder="0,00" value="${it?.targetValue||''}"></div>
      <div class="form-group"><label class="form-label">Valor Atual (R$)</label><input class="form-input" id="fc" type="number" step="0.01" min="0" placeholder="0,00" value="${it?.currentValue||0}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Categoria</label><input class="form-input" id="fcat" placeholder="Ex: Viagem, Veículo..." value="${it?.category||''}"></div>
      <div class="form-group"><label class="form-label">Prazo</label><input class="form-input" id="fdl" type="date" value="${it?.deadline||''}"></div>
    </div>
    <div class="form-group"><label class="form-label">Descrição</label><input class="form-input" id="fd" placeholder="Descreva sua meta..." value="${it?.description||''}"></div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="svMeta('${id}')">💾 Salvar</button>`);
}
function svMeta(id) {
  const name=document.getElementById('fn').value.trim(), icon=document.getElementById('fi').value;
  const target=parseFloat(document.getElementById('ft').value), current=parseFloat(document.getElementById('fc').value)||0;
  const cat=document.getElementById('fcat').value.trim(), dl=document.getElementById('fdl').value, desc=document.getElementById('fd').value.trim();
  if (!name||!target) return toast('Preencha nome e valor alvo','error');
  const obj={name,icon,targetValue:target,currentValue:current,category:cat,deadline:dl,description:desc};
  if (id) { const i=S.goals.findIndex(g=>g.id===id); S.goals[i]={...S.goals[i],...obj}; toast('Meta atualizada!','success'); }
  else { S.goals.push({id:genId(),...obj}); toast('Meta criada!','success'); }
  saveData(); closeModal(); pgMetas();
}
function delMeta(id) {
  if (!confirm('Excluir esta meta?')) return;
  S.goals=S.goals.filter(g=>g.id!==id); saveData(); toast('Removida','info'); pgMetas();
}
function mMetaProgress(id) {
  const g=S.goals.find(x=>x.id===id);
  if (!g) return;
  openModal(`Progresso — ${g.name}`, `
    <div style="margin-bottom:14px;font-size:13px;color:var(--text-secondary)">
      Meta: <strong>${R(g.targetValue)}</strong> · Atual: <strong>${R(g.currentValue)}</strong>
    </div>
    <div class="form-group"><label class="form-label">Novo valor acumulado (R$)</label><input class="form-input" id="fp" type="number" step="0.01" min="0" value="${g.currentValue}"></div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-success" onclick="svMetaProgress('${id}')">💾 Salvar</button>`);
}
function svMetaProgress(id) {
  const v=parseFloat(document.getElementById('fp').value)||0;
  const i=S.goals.findIndex(g=>g.id===id); S.goals[i].currentValue=v;
  if (v>=S.goals[i].targetValue) toast('🎉 Parabéns! Meta atingida!','success');
  else toast('Progresso atualizado!','success');
  saveData(); closeModal(); pgMetas();
}

// ════════════════════════════════════════════════
// EXPORT CSV
// ════════════════════════════════════════════════
function exportCSV() {
  const m=S.cm, y=S.cy, ms=mName(m,y);
  let csv=`﻿Controle Financeiro — ${ms}\n\n`;
  csv+='RECEITAS\nDescrição,Categoria,Data,Valor\n';
  S.incomes.filter(i=>isCurMonth(i.date)).forEach(i=>{ csv+=`"${i.description}","${i.category}","${fDate(i.date)}","${i.value}"\n`; });
  csv+='\nDESPESAS\nDescrição,Categoria,Data,Total,Parcelas,Juros%,Total+Juros\n';
  S.purchases.filter(p=>isCurMonth(p.date)).forEach(p=>{ csv+=`"${p.description}","${p.category}","${fDate(p.date)}","${p.totalValue}","${p.installments}","${p.interestRate||0}","${p.totalWithInterest||p.totalValue}"\n`; });
  csv+='\nAPORTES\nData,Observação,Valor\n';
  S.savings.filter(s=>isCurMonth(s.date)).forEach(s=>{ csv+=`"${fDate(s.date)}","${s.observation||''}","${s.value}"\n`; });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`financas_${y}_${String(m+1).padStart(2,'0')}.csv`; a.click();
  URL.revokeObjectURL(url);
  toast('CSV exportado com sucesso!','success');
}
